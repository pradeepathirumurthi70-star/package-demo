name: Share data between jobs

on:
  workflow_dispatch:
  push:

jobs:
  job_1:
    name: Upload File
    runs-on: ubuntu-latest

    steps:
      - run: echo "Hello World" > file.txt

      - uses: actions/upload-artifact@v5.0.0
        with:
          name: file
          path: file.txt

  job_2:
    name: Download File
    runs-on: ubuntu-latest
    needs: job_1

    steps:
      - uses: actions/download-artifact@v5.0.0
        with:
          name: file

      - run: cat file.txt
